<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Compressor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(0deg, #000328, #00458E);
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      font-family: "Inter", sans-serif;
    }

    .main-wrap {
      flex: 1;
      width: 100%;
      padding: 24px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dropzone {
      border: 2px dashed #90a4ae;
      border-radius: 8px;
      padding: 32px 16px;
      text-align: center;
      color: #546e7a;
      background: #fafafa;
      transition: all 0.2s ease;
      cursor: pointer;
      margin-bottom: 8px;
    }

    .dropzone:hover,
    .dropzone.dragover {
      border-color: #00897b;
      background: #e0f2f1;
      color: #004d40;
    }

    .status {
      margin-top: 16px;
      font-weight: 500;
      color: #546e7a;
    }

    .status.ok {
      color: #2e7d32;
    }

    .status.err {
      color: #c62828;
    }

    .result-name {
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    .result-meta {
      color: #546e7a;
      font-size: 0.92rem;
      margin-top: 4px;
    }

    .result-actions {
      margin-top: 12px;
    }

    .progress-wrap {
      margin-top: 12px;
      display: none;
    }

    .progress-wrap.active {
      display: block;
    }

    .progress-label {
      font-size: 0.9rem;
      color: #546e7a;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .footer-note {
      width: 100%;
      padding: 12px 0 16px;
      text-align: center;
      color: #eceff1;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="main-wrap">
    <div class="w-full max-w-4xl rounded-xl bg-white shadow-xl">
      <div class="p-6 md:p-8">
        <h1 class="text-3xl font-semibold text-slate-900">Image Compressor</h1>
        <h2 class="mt-2 text-base font-normal text-slate-600">Drop one or multiple images, compress them in your browser, and download the results.</h2>

        <div class="mt-3 grid grid-cols-1 gap-4 md:grid-cols-3">
          <div>
            <label for="quality" class="mb-1 block text-sm font-medium text-slate-700">Quality (1-100)</label>
            <input id="quality" type="number" min="1" max="100" value="75" class="w-full rounded-md border border-slate-300 px-3 py-2 text-slate-800 outline-none transition focus:border-cyan-600 focus:ring-2 focus:ring-cyan-100" />
          </div>
          <div>
            <label for="maxWidth" class="mb-1 block text-sm font-medium text-slate-700">Max width (px, optional)</label>
            <input id="maxWidth" type="number" min="1" class="w-full rounded-md border border-slate-300 px-3 py-2 text-slate-800 outline-none transition focus:border-cyan-600 focus:ring-2 focus:ring-cyan-100" />
          </div>
          <div>
            <label for="format" class="mb-1 block text-sm font-medium text-slate-700">Output format</label>
            <select id="format" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-slate-800 outline-none transition focus:border-cyan-600 focus:ring-2 focus:ring-cyan-100">
              <option value="image/jpeg" selected>JPEG</option>
              <option value="image/webp">WebP</option>
            </select>
          </div>
        </div>

        <div id="dropzone" class="dropzone mt-3" role="button" tabindex="0">
          Drop images here or click to choose files
        </div>
        <input id="fileInput" type="file" accept="image/*" multiple hidden />

        <div class="mt-2 grid grid-cols-1 gap-2 md:grid-cols-3">
          <div>
            <button id="compressBtn" class="w-full rounded-md bg-teal-700 px-4 py-2 text-sm font-semibold text-white transition hover:bg-teal-800 disabled:cursor-not-allowed disabled:opacity-50" disabled>Compress</button>
          </div>
          <div>
            <button id="downloadAllBtn" class="w-full rounded-md bg-blue-700 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-800 disabled:cursor-not-allowed disabled:opacity-50" disabled>Download all</button>
          </div>
          <div>
            <button id="clearBtn" class="w-full rounded-md bg-slate-700 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800">Clear</button>
          </div>
        </div>

        <div id="progressWrap" class="progress-wrap" aria-live="polite">
          <div id="progressLabel" class="progress-label">Compressing: 0%</div>
          <div class="h-2.5 overflow-hidden rounded-full bg-slate-200">
            <div id="progressBar" class="h-full bg-cyan-600 transition-all" style="width: 0%"></div>
          </div>
        </div>

        <div id="status" class="status">No files selected.</div>

        <ul id="results" class="mt-4 space-y-3"></ul>
      </div>
    </div>
  </main>
  <footer class="footer-note">made by <a href="https://serif.je?ref=smush" target="_blank" rel="noopener noreferrer">serif.je</a></footer>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const compressBtn = document.getElementById('compressBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    const qualityEl = document.getElementById('quality');
    const maxWidthEl = document.getElementById('maxWidth');
    const formatEl = document.getElementById('format');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const progressLabel = document.getElementById('progressLabel');

    let selectedFiles = [];
    let compressedFiles = [];

    const formatBytes = (bytes) => {
      if (bytes === 0) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      return `${(bytes / (1024 ** i)).toFixed(i === 0 ? 0 : 2)} ${units[i]}`;
    };

    const setStatus = (text, type = '') => {
      statusEl.textContent = text;
      statusEl.className = `status ${type}`.trim();
    };

    const resetOutput = () => {
      compressedFiles.forEach((file) => URL.revokeObjectURL(file.url));
      compressedFiles = [];
      resultsEl.innerHTML = '';
      downloadAllBtn.disabled = true;
    };

    const hideProgress = () => {
      progressWrap.classList.remove('active');
      progressBar.style.width = '0%';
      progressLabel.textContent = 'Compressing: 0%';
    };

    const showProgress = () => {
      progressWrap.classList.add('active');
    };

    const updateProgress = (done, total) => {
      const safeTotal = Math.max(1, total);
      const percent = Math.round((done / safeTotal) * 100);
      progressBar.style.width = `${percent}%`;
      progressLabel.textContent = `Compressing: ${done}/${total} (${percent}%)`;
    };

    const updateSelection = (files) => {
      selectedFiles = files.filter((f) => f.type.startsWith('image/'));
      compressBtn.disabled = selectedFiles.length === 0;
      resetOutput();
      hideProgress();

      if (selectedFiles.length === 0) {
        setStatus('No valid image files selected.', 'err');
        return;
      }

      const total = selectedFiles.reduce((sum, f) => sum + f.size, 0);
      setStatus(`Selected ${selectedFiles.length} image(s), total ${formatBytes(total)}.`);
    };

    const getExtForMime = (mime) => {
      if (mime === 'image/webp') return 'webp';
      if (mime === 'image/png') return 'png';
      return 'jpg';
    };

    const compressImage = (file, quality, maxWidth, mimeType) => new Promise((resolve, reject) => {
      const img = new Image();
      const reader = new FileReader();

      reader.onload = (e) => {
        img.src = e.target.result;
      };

      reader.onerror = () => reject(new Error(`Failed to read ${file.name}`));

      img.onload = () => {
        const scale = maxWidth && img.width > maxWidth ? maxWidth / img.width : 1;
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        canvas.toBlob((blob) => {
          if (!blob) {
            reject(new Error(`Failed to compress ${file.name}`));
            return;
          }

          const ext = getExtForMime(mimeType);
          const baseName = file.name.replace(/\.[^.]+$/, '');
          const outName = `${baseName}.compressed.${ext}`;
          const url = URL.createObjectURL(blob);
          resolve({ fileName: file.name, outName, originalSize: file.size, compressedSize: blob.size, url });
        }, mimeType, quality);
      };

      img.onerror = () => reject(new Error(`Invalid image file: ${file.name}`));

      reader.readAsDataURL(file);
    });

    const renderResults = () => {
      resultsEl.innerHTML = '';

      compressedFiles.forEach((item) => {
        const saved = item.originalSize - item.compressedSize;
        const percent = item.originalSize > 0
          ? Math.max(0, (saved / item.originalSize) * 100)
          : 0;

        const li = document.createElement('li');
        li.className = 'rounded-lg border border-slate-200 bg-slate-50 p-4';
        li.innerHTML = `
          <div class="result-name">${item.fileName}</div>
          <div class="result-meta">${formatBytes(item.originalSize)} -> ${formatBytes(item.compressedSize)} (${percent.toFixed(1)}% smaller)</div>
          <div class="result-meta">Download name: ${item.outName}</div>
          <div class="result-actions">
            <a class="inline-flex rounded-md bg-blue-700 px-3 py-1.5 text-sm font-semibold text-white transition hover:bg-blue-800" href="${item.url}" download="${item.outName}">Download</a>
          </div>
        `;
        resultsEl.appendChild(li);
      });
    };

    const triggerDownload = (href, filename) => {
      const a = document.createElement('a');
      a.href = href;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
    };

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        fileInput.click();
      }
    });

    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });

    ['dragleave', 'dragend'].forEach((evt) => {
      dropzone.addEventListener(evt, () => dropzone.classList.remove('dragover'));
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      const files = Array.from(e.dataTransfer.files || []);
      updateSelection(files);
    });

    fileInput.addEventListener('change', (e) => {
      const files = Array.from(e.target.files || []);
      updateSelection(files);
    });

    compressBtn.addEventListener('click', async () => {
      if (selectedFiles.length === 0) return;

      const qualityValue = Math.min(100, Math.max(1, Number(qualityEl.value || 75))) / 100;
      qualityEl.value = String(Math.round(qualityValue * 100));

      const maxWidthRaw = Number(maxWidthEl.value);
      const maxWidth = Number.isFinite(maxWidthRaw) && maxWidthRaw > 0 ? Math.floor(maxWidthRaw) : null;
      const mimeType = formatEl.value;

      setStatus('Compressing images...');
      compressBtn.disabled = true;
      downloadAllBtn.disabled = true;
      showProgress();
      updateProgress(0, selectedFiles.length);

      resetOutput();
      let success = 0;
      let processed = 0;

      for (const file of selectedFiles) {
        try {
          const result = await compressImage(file, qualityValue, maxWidth, mimeType);
          compressedFiles.push(result);
          success += 1;
        } catch (err) {
          console.error(err);
        } finally {
          processed += 1;
          updateProgress(processed, selectedFiles.length);
        }
      }

      compressBtn.disabled = false;
      hideProgress();

      if (compressedFiles.length === 0) {
        setStatus('Compression failed for all files.', 'err');
        return;
      }

      downloadAllBtn.disabled = false;
      renderResults();

      const originalTotal = compressedFiles.reduce((s, i) => s + i.originalSize, 0);
      const compressedTotal = compressedFiles.reduce((s, i) => s + i.compressedSize, 0);
      const saved = originalTotal - compressedTotal;
      const pct = originalTotal > 0 ? (saved / originalTotal) * 100 : 0;
      const partial = success < selectedFiles.length ? ` (${selectedFiles.length - success} failed)` : '';

      setStatus(`Compressed ${success}/${selectedFiles.length} image(s). Saved ${formatBytes(saved)} (${pct.toFixed(1)}%).${partial}`, 'ok');
    });

    downloadAllBtn.addEventListener('click', () => {
      if (compressedFiles.length === 0) return;

      compressedFiles.forEach((item, index) => {
        setTimeout(() => {
          triggerDownload(item.url, item.outName);
        }, index * 150);
      });
    });

    clearBtn.addEventListener('click', () => {
      selectedFiles = [];
      fileInput.value = '';
      resetOutput();
      hideProgress();
      compressBtn.disabled = true;
      setStatus('No files selected.');
    });
  </script>
</body>
</html>
